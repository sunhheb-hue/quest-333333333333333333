name: PR Preview Open Deploy

# 触发条件：PR创建/更新/重新打开时
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  pr-preivew:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 PR 分支代码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm install

      - name: 动态修改base路径（适配PR预览子目录）
        run: |
          # 针对Vite项目，动态修改vite.config.ts的base
          PR_NUMBER=${{ github.event.number }}
          sed -i "s|base:.*|base: '/quest-333333333333333333/prs/pr${PR_NUMBER}/',|" vite.config.ts
          # 验证修改是否生效
          cat vite.config.ts

      - name: 项目构建
        run: npm run build

      - name: 部署到预览分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.PAT }}  # 复用你之前创建的PAT
          publish_branch: pages
          publish_dir: ./dist
          destination_dir: prs/pr${{ github.event.number }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_files: true

      - name: 评论预览链接到PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ✅ PR #${{ github.event.number }} 预览已生成！
            📦 构建分支：pages/prs/pr${{ github.event.number }}
            ⚠️  仅用于测试，请勿直接访问正式环境
          GITHUB_TOKEN: ${{ secrets.PAT }}
